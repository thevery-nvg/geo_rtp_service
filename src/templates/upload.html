{% extends 'base.html' %}

{% block title %}
Upload - FastAPI Фронтенд
{% endblock %}

{% block content %}
<link rel="stylesheet" href="static/css/upload-style.css?rnd=<?= rand(0, 999) ?>">

<div class="upload-wrapper">
    <div class="upload-container">
        <div class="upload-card">
            <div class="upload-header">
                <h2>Загрузить файлы</h2>
                <p>Выберите файлы для загрузки на сервер</p>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon" id="uploadIcon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 16V4M12 4L8 8M12 4L16 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M20 16V20H4V16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="upload-text" id="uploadText">
                    <h3>Нажмите для выбора</h3>
                    <p>или перетащите файлы сюда</p>
                </div>
                <ul class="file-list" id="fileList" style="display: none;"></ul>
            </div>

            <div class="upload-actions">
                <button class="action-button secondary-button" id="cancelButton" style="display: none;">
                    <span class="button-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                    Отмена
                </button>
                <button class="action-button primary-button" id="uploadButton">
                    <span class="button-icon" id="uploadButtonIcon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 16V4M12 4L8 8M12 4L16 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span id="uploadButtonText">Выбрать файлы</span>
                </button>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>

            <div class="message success-message" id="successMessage">
                ✅ Файлы успешно загружены!
            </div>

            <div class="message error-message" id="errorMessage">
                ❌ Ошибка при загрузке файлов
            </div>

            <input type="file" id="fileInput" class="file-input" multiple />
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const uploadArea = document.getElementById('uploadArea');
    const uploadButton = document.getElementById('uploadButton');
    const uploadButtonText = document.getElementById('uploadButtonText');
    const uploadButtonIcon = document.getElementById('uploadButtonIcon');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const cancelButton = document.getElementById('cancelButton');
    const progressBar = document.getElementById('progressBar');
    const progressBarFill = document.getElementById('progressBarFill');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');
    const uploadIcon = document.getElementById('uploadIcon');
    const uploadText = document.getElementById('uploadText');

    let filesArray = [];
    let expanded = false;

    function showMessage(element, duration = 3000) {
        element.style.display = 'block';
        setTimeout(() => {
            element.style.display = 'none';
        }, duration);
    }

    function expandArea() {
        expanded = true;
        uploadArea.classList.add('expanded');
        fileList.style.display = 'block';
        cancelButton.style.display = 'block';
        uploadButtonText.textContent = 'Загрузить';
        uploadButtonIcon.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path d="M5 12H19M12 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        `;
        uploadIcon.style.display = 'none';
        uploadText.style.display = 'none';
    }

    function collapseArea() {
        expanded = false;
        uploadArea.classList.remove('expanded');
        fileList.style.display = 'none';
        cancelButton.style.display = 'none';
        uploadButtonText.textContent = 'Выбрать файлы';
        uploadButtonIcon.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path d="M12 16V4M12 4L8 8M12 4L16 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        `;
        uploadIcon.style.display = 'block';
        uploadText.style.display = 'block';
        filesArray = [];
    }

    uploadArea.addEventListener('click', () => {
        if (!expanded) {
            fileInput.click();
        }
    });

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#2f323b';
        uploadArea.style.background = '#f0f4ff';
    });

    uploadArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#e0e0e0';
        uploadArea.style.background = '#f9f9f9';
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#e0e0e0';
        uploadArea.style.background = '#f9f9f9';

        const droppedFiles = Array.from(e.dataTransfer.files);
        if (droppedFiles.length > 0) {
            filesArray = droppedFiles;
            updateFileList();
            expandArea();
        }
    });

    fileInput.addEventListener('change', () => {
        filesArray = Array.from(fileInput.files);
        if (filesArray.length > 0) {
            updateFileList();
            expandArea();
        }
    });

    function updateFileList() {
        fileList.innerHTML = '';
        filesArray.forEach(file => {
            const listItem = document.createElement('li');
            listItem.innerHTML = `
                <span class="file-name">${file.name}</span>
                <span class="file-size">${formatBytes(file.size)}</span>
            `;
            fileList.appendChild(listItem);
        });
    }

    uploadButton.addEventListener('click', () => {
        if (!expanded) {
            fileInput.click();
        } else {
            uploadFiles(filesArray);
        }
    });

    cancelButton.addEventListener('click', () => {
        collapseArea();
        fileInput.value = '';
        progressBar.style.display = 'none';
        progressBarFill.style.width = '0%';
    });

    async function uploadFiles(files) {
        const formData = new FormData();
        for (const file of files) {
            formData.append('files', file);
        }

        const xhr = new XMLHttpRequest();
        progressBar.style.display = 'block';
        successMessage.style.display = 'none';
        errorMessage.style.display = 'none';

        xhr.upload.addEventListener('progress', (event) => {
            if (event.lengthComputable) {
                const percentComplete = (event.loaded / event.total) * 100;
                progressBarFill.style.width = `${percentComplete}%`;
            }
        });

        xhr.addEventListener('load', () => {
            if (xhr.status >= 200 && xhr.status < 300) {
                progressBarFill.style.width = '100%';
                setTimeout(() => {
                    progressBar.style.display = 'none';
                    progressBarFill.style.width = '0%';
                    showMessage(successMessage);
                    collapseArea();
                    fileInput.value = '';
                }, 500);
            } else {
                progressBar.style.display = 'none';
                progressBarFill.style.width = '0%';
                showMessage(errorMessage);
            }
        });

        xhr.addEventListener('error', () => {
            progressBar.style.display = 'none';
            progressBarFill.style.width = '0%';
            showMessage(errorMessage);
        });

        xhr.open('POST', '/upload', true);
        xhr.send(formData);
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }
});
</script>
{% endblock %}
